name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-web:
    name: Web - Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @beacon-bazaar/web lint
      - run: yarn workspace @beacon-bazaar/web test

  lint-and-test-backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: beacon_bazaar_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @beacon-bazaar/backend lint
      - run: yarn workspace @beacon-bazaar/backend test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beacon_bazaar_test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  build-web:
    name: Web - Build
    needs: lint-and-test-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @beacon-bazaar/web build

  build-backend:
    name: Backend - Build
    needs: lint-and-test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @beacon-bazaar/backend build
