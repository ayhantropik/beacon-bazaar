# Render.com IaC - Tek tıkla deploy
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: venividicoop-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: |
      yarn install --frozen-lockfile --production=false &&
      yarn workspace @beacon-bazaar/shared build &&
      cd apps/backend && node ../../node_modules/@nestjs/cli/bin/nest.js build
    startCommand: cd apps/backend && node dist/src/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PREFIX
        value: api/v1

      # Aşağıdakiler Render Dashboard'da elle eklenecek (sensitive):
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

      - key: CORS_ORIGINS
        value: "*"
      - key: FRONTEND_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
